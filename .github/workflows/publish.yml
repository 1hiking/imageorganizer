name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Build
        run: uv build

      - name: Smoke test
        # Ensure the wheel actually installs and runs
        run: |
          uv run --isolated --with dist/*.whl -m pytest tests/test_organizer.py

      - name: Publish
        # --trusted-publishing is the default for OIDC, but being explicit is better
        run: uv publish